name: CI/CD - User Service

on:
  push:
    branches: [main]
    paths:
      - 'apps/user-service/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        working-directory: apps/user-service/user
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/user-service/user
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/user-service:latest

      - name: Deploy to Google Cloud Run
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: user-service
          image: docker.io/${{ secrets.DOCKER_USERNAME }}/user-service:latest
          region: us-central1
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}